version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgreSQL-named-by-me
    environment:
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U db_user -d app_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6.0
    container_name: mongodb-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: app_mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
        # MongoDB'nin modern shell'i 'mongosh' ile ping atarak hazır olup olmadığını kontrol eder
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finn360BE
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/app_db
      SPRING_DATASOURCE_USERNAME: db_user
      SPRING_DATASOURCE_PASSWORD: db_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      SPRING_DATA_MONGODB_URI: mongodb://mongo_user:mongo_password@mongo:27017/app_mongo_db?authSource=admin

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  pg_data:
  mongo_data: